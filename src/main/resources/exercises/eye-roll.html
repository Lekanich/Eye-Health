<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="css/exercise.css"/>
	<title>Exercise Instructions</title>
</head>
<body>
<h2 style="text-align:center">
	Eye Roll
</h2>
<p>
	Sit up <span class="attention">straight</span>, <span class="attention">relax</span> your shoulders, look forward.
</p>
<p>
	<span class="attention">Look</span> to the <span class="attention">right</span> and <span class="attention">roll</span> your eyes <span class="attention">upward</span>.
</p>
<p>
	<span class="attention">Roll</span> eyes <span class="attention">downward</span> <span class="attention">to the left</span> and then <span class="attention">to the bottom</span>.
</p>
<p>
	<span class="attention">Repeat</span> the exercise in the <span class="attention">opposite direction</span>.
</p>
<p>
	Try to perform this exercise <span class="attention">10 times</span> for max eye relaxation.
</p>
</body>
</html>
