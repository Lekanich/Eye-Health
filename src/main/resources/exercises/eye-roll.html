<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="css/exercise.css"/>
	<title>Exercise Instructions</title>
</head>
<body>
<h2 style="text-align:center">
	Eye Roll
</h2>
<p>
	Sit up <span class="attention">straight</span> and <span class="attention">relax</span>.
</p>
<p>
	<span class="attention">Look</span> <span class="attention">right</span>, then <span class="attention">roll</span> your eyes <span class="attention">upward</span>.
</p>
<p>
	<span class="attention">Roll</span> your eyes <span class="attention">down</span> and <span class="attention">to the left</span>.
</p>
<p>
	<span class="attention">Repeat</span> the exercise in the <span class="attention">opposite direction</span>.
</p>
<p>
	<span class="attention">Repeat</span> <span class="attention">10 times</span> in each direction.
</p>
</body>
</html>
