	The Palm Eye
</h2>
<p>
	<span class="attention">Cup</span> your hands over your <span class="attention">closed eyes</span>.
</p>
<p>
	<span class="attention">Stare</span> into the darkness.
</p>
<p>
	Hold for at least 30 seconds.
</p>
<p>
	This will help reset your eyes.
</p>
