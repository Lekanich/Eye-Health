<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="css/exercise.css"/>
	<title>Exercise Instructions</title>
</head>
<body>
<h2 style="text-align:center">
	Figure Eights
</h2>
<p>
	<span class="attention">Sit</span> up straight with your hands on your knees.
</p>
<p>
	<span class="attention">Lift</span> your <span class="attention">right hand</span> out in front of you, <span class="attention">thumb up</span>.
</p>
<p>
	<span class="attention">Look</span> at your <span class="attention">thumb</span>.
</p>
<p>
	<span class="attention">Trace</span> a figure <span class="attention">8</span> in the air with your thumb.
</p>
<p>
	Trace the figure <span class="attention">8</span> five times in each direction.
</p>
<p>
	Next, <span class="attention">repeat</span> the exercise with your <span class="attention">left</span> thumb.
</p>
</body>
</html>
